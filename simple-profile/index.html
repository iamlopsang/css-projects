<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Simple Profile Card</h1>

    <!-- ===== Profile Card Container ===== -->
    <div id="profile-card">

        <!-- ===== Profile Card Box ===== -->
        <div class="profile-image">
            <figure>

                 <!-- ===== Profile Image Section ===== -->
                <img src="./images/image1.jpg" alt="profile picture" width="150px" height="200px">
                <figcaption>Leon Lama</figcaption>
            </figure>

              <!-- ===== Position ===== -->
            <p id="field">Position: Data Scientist</p>

            <!-- ===== Bio ===== -->
            <p class="bio">Learning data analysis and improving skills every day</p>
            <hr>

              <!-- ===== Social Links ===== -->
            <div class="social">
                <a href="https://www.linkedin.com/in/leon-lama-123456789/" target="_blank">LinkedIn</a>
                <a href="https://github.com/leonlama" target="_blank">GitHub</a>
                <a href="#" target="_blank">Twitter</a>
            </div>
        </div>

    </div>

    <!-- unsplash image1--michaeldam -->

</body>

</html>
